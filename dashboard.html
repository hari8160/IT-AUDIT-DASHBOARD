<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Akshya Impex | Interactive Textile Audit Dashboard</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f8;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 24px 32px;
      color: #0a1e2f;
    }

    .app-container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .logo-area h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1a3e60, #0f2c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo-area span {
      font-size: 0.85rem;
      color: #5a6e7c;
      font-weight: 500;
    }

    .user-badge {
      background: white;
      border-radius: 40px;
      padding: 8px 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #e2e8f0;
    }

    .user-badge strong {
      font-weight: 600;
      color: #1e3a5f;
    }

    .audit-tag {
      background: #eef2ff;
      padding: 4px 12px;
      border-radius: 24px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #1e40af;
    }

    .dashboard-grid {
      display: flex;
      gap: 28px;
    }

    .side-menu {
      width: 260px;
      flex-shrink: 0;
      background: white;
      border-radius: 28px;
      padding: 24px 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
      border: 1px solid #eef2f6;
      height: fit-content;
      position: sticky;
      top: 24px;
    }

    .menu-section {
      margin-bottom: 28px;
    }

    .menu-section h4 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c7f8f;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      margin: 4px 0;
      border-radius: 16px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #2c3e4e;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-item.active {
      background: #eef2ff;
      color: #1e4a76;
      font-weight: 600;
    }

    .menu-item:hover:not(.active) {
      background: #f8fafc;
    }

    .main-panel {
      flex: 1;
      background: white;
      border-radius: 28px;
      border: 1px solid #edf2f7;
      overflow: hidden;
      padding: 24px 28px;
    }

    .metrics-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .metric-card {
      background: #f9fbfd;
      border-radius: 24px;
      padding: 18px 20px;
      flex: 1;
      min-width: 170px;
      border: 1px solid #eef2f8;
    }

    .metric-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: 600;
      color: #5c6f87;
    }

    .metric-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0f2b3d;
      margin: 8px 0 4px;
    }

    .metric-trend {
      font-size: 0.75rem;
      color: #2c7a4b;
      background: #e6f4ea;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 30px;
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      justify-content: space-between;
      flex-wrap: wrap;
      border-bottom: 1px solid #edf2f0;
      padding-bottom: 16px;
    }

    .filters-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-btn, .duration-btn, .payment-filter, .category-filter {
      background: #f1f5f9;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active, .duration-btn.active, .payment-filter.active, .category-filter.active {
      background: #1e4a76;
      color: white;
    }

    .refresh {
      background: #eef2ff;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .data-table th {
      text-align: left;
      padding: 14px 8px 10px 0;
      font-weight: 600;
      color: #4b5c6e;
      border-bottom: 1px solid #e9edf2;
      position: sticky;
      top: 0;
      background: white;
    }

    .data-table td {
      padding: 12px 8px 12px 0;
      border-bottom: 1px solid #f0f3f8;
    }

    .risk-high { background: #fff0f0; color: #b91c1c; padding: 4px 10px; border-radius: 40px; display: inline-block; font-weight: 600; }
    .risk-mid { background: #fff4e6; color: #b45309; padding: 4px 10px; border-radius: 40px; }
    .risk-low { background: #e6f4ea; color: #2b6e3c; padding: 4px 10px; border-radius: 40px; }
    .status-approved { background: #e3f5e9; color: #2b6e3c; padding: 4px 12px; border-radius: 40px; display: inline-block; }
    .status-flagged { background: #fee2e2; color: #b91c1c; padding: 4px 12px; border-radius: 40px; }
    .status-review { background: #fef7e0; color: #a16207; padding: 4px 12px; border-radius: 40px; }

    .section-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .chart-container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      margin: 30px 0;
    }
    .chart-box {
      flex: 1;
      min-width: 320px;
      background: #fafcff;
      padding: 20px;
      border-radius: 24px;
      border: 1px solid #eef2f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .risk-legend {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      padding: 15px;
      background: #f8fafc;
      border-radius: 20px;
      flex-wrap: wrap;
    }
    .risk-badge-low { background: #e6f4ea; color: #2b6e3c; padding: 4px 12px; border-radius: 40px; }
    .risk-badge-med { background: #fff4e6; color: #b45309; padding: 4px 12px; border-radius: 40px; }
    .risk-badge-high { background: #fee2e2; color: #b91c1c; padding: 4px 12px; border-radius: 40px; }
    .audit-card {
      background: #fefcf5;
      border-left: 5px solid #c2410c;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 18px;
    }
    h4 { margin-bottom: 12px; color: #2c3e4e; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <div class="logo-area"><h1>Akshya Impex Pvt. Ltd.</h1><span>Textile Import-Export | IT Audit & Trade Compliance</span></div>
    <div class="user-badge"><span>🔐 Lead Auditor</span><strong>HARI PRASATH P</strong><span class="audit-tag">Last Audit: Apr 2026</span></div>
  </div>
  <div class="dashboard-grid">
    <div class="side-menu">
      <div class="menu-section"><h4>Dashboard</h4>
        <div class="menu-item active" data-page="dashboard">📊 Overview</div>
        <div class="menu-item" data-page="transactions">📃 Transactions</div>
        <div class="menu-item" data-page="risk">⚠️ Risk Management</div>
        <div class="menu-item" data-page="audits">📑 Audit Reports</div>
      </div>
      <div class="menu-section"><h4>Trade Analytics</h4>
        <div class="menu-item" data-page="salesCategory">🧵 Sales by Category</div>
        <div class="menu-item">📦 LC & Bill of Lading</div>
      </div>
    </div>
    <div class="main-panel" id="mainPanel"><div id="dynamicContent">Loading comprehensive audit suite...</div></div>
  </div>
</div>

<script>
  // ======================== COMPREHENSIVE TRANSACTION DATA (Textile + Retail categories) ========================
  const allTransactions = [
    { id: "TXN-4401", product: "Premium Poplin Rolls", category: "Finished Fabric", amount: 345000, payment: "Card", date: "2026-02-10", time: "09:15", riskScore: 22, status: "Approved" },
    { id: "TXN-4402", product: "Raw Cotton Bales", category: "Raw Materials", amount: 875000, payment: "NetBanking", date: "2026-02-15", time: "10:22", riskScore: 18, status: "Approved" },
    { id: "TXN-4403", product: "Polyester Yarn Cones", category: "Yarn", amount: 212500, payment: "UPI", date: "2026-03-01", time: "11:05", riskScore: 31, status: "Review" },
    { id: "TXN-4404", product: "Silk Fabric (Import)", category: "Import Consignment", amount: 2850000, payment: "Card", date: "2026-03-05", time: "12:30", riskScore: 76, status: "Flagged" },
    { id: "TXN-4405", product: "Linen Blended Suiting", category: "Finished Fabric", amount: 128500, payment: "Cash", date: "2026-03-10", time: "13:18", riskScore: 12, status: "Approved" },
    { id: "TXN-4406", product: "Denim Raw Rolls", category: "Garments", amount: 445000, payment: "Card", date: "2026-03-12", time: "14:42", riskScore: 29, status: "Approved" },
    { id: "TXN-4407", product: "Viscose Rayon", category: "Yarn", amount: 187200, payment: "UPI", date: "2026-03-15", time: "15:09", riskScore: 8, status: "Approved" },
    { id: "TXN-4408", product: "Spandex Knitted", category: "Finished Fabric", amount: 94500, payment: "Cash", date: "2026-03-18", time: "16:27", riskScore: 14, status: "Approved" },
    { id: "TXN-4409", product: "Wool Blend Exports", category: "Garments", amount: 672000, payment: "NetBanking", date: "2026-03-20", time: "17:55", riskScore: 52, status: "Review" },
    { id: "TXN-4410", product: "Recycled Polyester", category: "Raw Materials", amount: 334000, payment: "Card", date: "2026-03-22", time: "09:47", riskScore: 27, status: "Approved" },
    { id: "TXN-4411", product: "Twill Drill Fabric", category: "Finished Fabric", amount: 289000, payment: "UPI", date: "2026-03-25", time: "11:32", riskScore: 19, status: "Approved" },
    { id: "TXN-4412", product: "Satin Georgette", category: "Finished Fabric", amount: 156800, payment: "Cash", date: "2026-03-28", time: "13:05", riskScore: 11, status: "Approved" },
    { id: "TXN-4413", product: "Jute Bags (Exp)", category: "Logistics", amount: 98500, payment: "NetBanking", date: "2026-04-01", time: "14:20", riskScore: 58, status: "Review" },
    { id: "TXN-4414", product: "Textile Dyes Lot", category: "Chemicals", amount: 427000, payment: "Card", date: "2026-04-02", time: "15:48", riskScore: 34, status: "Approved" },
    { id: "TXN-4415", product: "LC Draft #2341", category: "Import Consignment", amount: 1860000, payment: "NetBanking", date: "2026-04-03", time: "16:15", riskScore: 83, status: "Flagged" },
    { id: "TXN-4416", product: "Modal Fabric Rolls", category: "Finished Fabric", amount: 512000, payment: "Card", date: "2026-04-05", time: "09:58", riskScore: 41, status: "Review" },
    { id: "TXN-4417", product: "Nylon Filament Yarn", category: "Yarn", amount: 276500, payment: "UPI", date: "2026-04-06", time: "11:44", riskScore: 36, status: "Approved" },
    { id: "TXN-4418", product: "Embroidery Threads", category: "Garments", amount: 78300, payment: "Cash", date: "2026-04-07", time: "13:30", riskScore: 62, status: "Review" },
    { id: "TXN-4419", product: "INVOICE-SUP-TEX-41", category: "Import Consignment", amount: 3245000, payment: "Card", date: "2026-04-08", time: "23:40", riskScore: 94, status: "Flagged" },
    { id: "TXN-4420", product: "Packing Materials", category: "Logistics", amount: 42500, payment: "UPI", date: "2026-04-09", time: "10:20", riskScore: 7, status: "Approved" },
    { id: "TXN-4421", product: "Cotton Waste", category: "Raw Materials", amount: 118000, payment: "Cash", date: "2026-04-10", time: "12:10", riskScore: 21, status: "Approved" },
    { id: "TXN-4422", product: "Premium Poplin White", category: "Finished Fabric", amount: 410000, payment: "NetBanking", date: "2026-04-11", time: "14:55", riskScore: 24, status: "Approved" },
    { id: "TXN-4423", product: "SUPPLIER-TEX-41-2nd", category: "Import Consignment", amount: 3245000, payment: "Card", date: "2026-04-12", time: "01:15", riskScore: 96, status: "Flagged" },
    { id: "TXN-4424", product: "Cotton Bales Premium", category: "Raw Materials", amount: 5278000, payment: "NetBanking", date: "2026-04-13", time: "21:20", riskScore: 92, status: "Flagged" },
    { id: "TXN-4425", product: "Organic Cotton Yarn", category: "Yarn", amount: 534000, payment: "Card", date: "2026-04-14", time: "08:35", riskScore: 45, status: "Review" },
    { id: "TXN-4426", product: "Staff Bulk Order", category: "Garments", amount: 184500, payment: "UPI", date: "2026-04-15", time: "03:10", riskScore: 86, status: "Flagged" },
    { id: "TXN-4427", product: "TEX-41-3rd Invoice", category: "Import Consignment", amount: 3245000, payment: "Card", date: "2026-04-16", time: "02:05", riskScore: 97, status: "Flagged" },
    { id: "TXN-4428", product: "Linen Blend Natural", category: "Finished Fabric", amount: 232000, payment: "Cash", date: "2026-04-17", time: "16:40", riskScore: 16, status: "Approved" },
    { id: "TXN-4429", product: "Spandex Fabric Rolls", category: "Finished Fabric", amount: 198500, payment: "UPI", date: "2026-04-18", time: "10:15", riskScore: 13, status: "Approved" },
    { id: "TXN-4430", product: "silver white dye", category: "Dye", amount: 1280, payment: "UPI", date: "2026-04-01", time: "09:14", riskScore: 22, status: "Approved" },
    { id: "TXN-4431", product: "synthetic cotton fabric rolls", category: "cotton rolls", amount: 85, payment: "Cash", date: "2026-04-02", time: "09:22", riskScore: 8, status: "Approved" },
    { id: "TXN-4432", product: "TEX-42-4th Invoice", category: "Import Consignment", amount: 4320, payment: "Card", date: "2026-04-03", time: "10:18", riskScore: 38, status: "Review" },
    { id: "TXN-4433", product: "pillow and bedsheets", category: "house materials", amount: 1350, payment: "Card", date: "2026-04-05", time: "19:30", riskScore: 19, status: "Approved" },
    { id: "TXN-4434", product: "dirt-cleaner", category: "Product", amount: 540, payment: "UPI", date: "2026-04-06", time: "18:45", riskScore: 12, status: "Approved" },
    { id: "TXN-4435", product: "roller", category: "Product", amount: 680, payment: "Card", date: "2026-04-07", time: "11:20", riskScore: 7, status: "Approved" }
  ];

  const getRiskLevel = (score) => score <= 30 ? "Low" : (score <= 60 ? "Medium" : "High");
  
  let filteredTransactions = [...allTransactions];
  let activeCategory = "All Categories";
  let activePayment = "All Payments";
  let activeDuration = "Last 3 Months";
  let currentPage = "dashboard";
  let chartInstances = {};

  function filterByDuration(transactions, duration) {
    let startDate = new Date("2026-01-20");
    if (duration === "Last 3 Months") startDate = new Date(2026, 0, 20);
    else if (duration === "Last 9 Months") startDate = new Date(2025, 6, 20);
    else if (duration === "Last 1 Year") startDate = new Date(2025, 3, 20);
    return transactions.filter(t => new Date(t.date) >= startDate);
  }

  function applyFilters() {
    let filtered = [...allTransactions];
    if (activeCategory !== "All Categories") filtered = filtered.filter(t => t.category === activeCategory);
    if (activePayment !== "All Payments") filtered = filtered.filter(t => t.payment === activePayment);
    filtered = filterByDuration(filtered, activeDuration);
    filteredTransactions = filtered;
    renderCurrentPage();
  }

  function destroyCharts() {
    Object.values(chartInstances).forEach(chart => { if (chart) chart.destroy(); });
    chartInstances = {};
  }

  function renderCurrentPage() {
    if (currentPage === "dashboard") renderDashboard();
    else if (currentPage === "transactions") renderTransactions();
    else if (currentPage === "risk") renderRiskAnalysis();
    else if (currentPage === "audits") renderAudits();
    else if (currentPage === "salesCategory") renderSalesByCategory();
  }

  // ========== SALES BY CATEGORY PAGE with Bar, Line, Pie - distinct charts ==========
  function renderSalesByCategory() {
    const categorySales = {};
    filteredTransactions.forEach(t => { categorySales[t.category] = (categorySales[t.category] || 0) + t.amount; });
    const labels = Object.keys(categorySales);
    const salesData = Object.values(categorySales);
    
    // Monthly trend per top 5 categories
    const months = ['Jan', 'Feb', 'Mar', 'Apr'];
    const topCategories = labels.slice(0, 5);
    const monthlyTrendData = topCategories.map(cat => {
      return months.map(month => {
        const monthNum = { 'Jan':'01', 'Feb':'02', 'Mar':'03', 'Apr':'04' }[month];
        return filteredTransactions.filter(t => t.category === cat && t.date.split('-')[1] === monthNum).reduce((s, t) => s + t.amount, 0);
      });
    });

    const html = `
      <div><div class="section-title">📊 Sales Performance by Category</div>
      <div class="filter-bar"><div class="filters-group" id="categoryFilters"></div><div class="filters-group" id="paymentFilters"></div><div class="filters-group" id="durationFilters"></div><div class="refresh" id="refreshBtn">⟳ Refresh</div></div>
      <div class="chart-container">
        <div class="chart-box"><h4>📊 Bar Chart: Sales by Category</h4><canvas id="salesBarChart"></canvas></div>
        <div class="chart-box"><h4>🥧 Pie Chart: Revenue Distribution</h4><canvas id="salesPieChart"></canvas></div>
      </div>
      <div class="chart-container">
        <div class="chart-box"><h4>📈 Trend: Top 5 Categories (Monthly)</h4><canvas id="salesLineChart"></canvas></div>
        <div class="chart-box"><h4>🏆 Horizontal Bar: Top Categories</h4><canvas id="salesHorizontalBar"></canvas></div>
      </div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Category</th><th>Total Sales (₹)</th><th>Transaction Count</th><th>Avg Ticket Size</th></tr></thead><tbody>
        ${labels.map(l => { const txns = filteredTransactions.filter(t=>t.category===l); const avg = txns.reduce((s,t)=>s+t.amount,0)/txns.length; return `<tr><td><strong>${l}</strong></td><td>₹${categorySales[l].toLocaleString()}</td><td>${txns.length}</td><td>₹${Math.round(avg).toLocaleString()}</td>`; }).join('')}
      </tbody></table></div></div>
    `;
    document.getElementById("dynamicContent").innerHTML = html;
    attachFilterEvents();
    setTimeout(() => {
      const barCtx = document.getElementById('salesBarChart')?.getContext('2d');
      const pieCtx = document.getElementById('salesPieChart')?.getContext('2d');
      const lineCtx = document.getElementById('salesLineChart')?.getContext('2d');
      const horizCtx = document.getElementById('salesHorizontalBar')?.getContext('2d');
      if (barCtx) chartInstances.bar = new Chart(barCtx, { type: 'bar', data: { labels, datasets: [{ label: 'Sales Amount (₹)', data: salesData, backgroundColor: '#1e4a76', borderRadius: 8 }] }, options: { responsive: true, plugins: { legend: { position: 'top' } } } });
      if (pieCtx) chartInstances.pie = new Chart(pieCtx, { type: 'pie', data: { labels, datasets: [{ data: salesData, backgroundColor: ['#1e4a76','#2c7a4b','#b45309','#a16207','#6c7f8f','#b91c1c','#0f2c42','#5a6e7c','#3b82f6','#eab308'] }] } });
      if (lineCtx && topCategories.length) {
        const datasets = topCategories.map((cat, idx) => ({ label: cat, data: monthlyTrendData[idx], borderColor: `hsl(${idx * 60}, 60%, 45%)`, fill: false, tension: 0.3 }));
        chartInstances.line = new Chart(lineCtx, { type: 'line', data: { labels: months, datasets }, options: { responsive: true } });
      }
      if (horizCtx) {
        const sorted = [...labels].map((l,i) => ({ label: l, value: salesData[i] })).sort((a,b) => b.value - a.value).slice(0,6);
        chartInstances.horiz = new Chart(horizCtx, { type: 'bar', data: { labels: sorted.map(s=>s.label), datasets: [{ label: 'Sales (₹)', data: sorted.map(s=>s.value), backgroundColor: '#b45309' }] }, options: { indexAxis: 'y', responsive: true } });
      }
    }, 50);
  }

  function renderDashboard() {
    const totalSales = filteredTransactions.reduce((s, t) => s + t.amount, 0);
    const highRisk = filteredTransactions.filter(t => getRiskLevel(t.riskScore) === "High").length;
    const approved = filteredTransactions.filter(t => t.status === "Approved").length;
    const flagged = filteredTransactions.filter(t => t.status === "Flagged").length;
    const review = filteredTransactions.filter(t => t.status === "Review").length;
    const html = `
      <div><div class="section-title">Overview | Trade Audit · Apr 2026</div>
      <div class="metrics-row">
        <div class="metric-card"><div class="metric-title">TOTAL VALUE</div><div class="metric-value">₹${(totalSales/100000).toFixed(1)}L</div><span class="metric-trend">↑ 11.2%</span></div>
        <div class="metric-card"><div class="metric-title">TRANSACTIONS</div><div class="metric-value">${filteredTransactions.length}</div><span class="metric-trend">Active</span></div>
        <div class="metric-card"><div class="metric-title">HIGH RISK</div><div class="metric-value">${highRisk}</div><span class="metric-trend">⚠️ Critical</span></div>
        <div class="metric-card"><div class="metric-title">DUPLICATE REFS</div><div class="metric-value">8</div><span class="metric-trend">Container alert</span></div>
      </div>
      <div class="filter-bar"><div class="filters-group" id="categoryFilters"></div><div class="filters-group" id="paymentFilters"></div><div class="filters-group" id="durationFilters"></div><div class="refresh" id="refreshBtn">⟳ Refresh</div></div>
      <div class="chart-container"><div class="chart-box"><h4>📈 Monthly Sales Trend</h4><canvas id="trendChart"></canvas></div><div class="chart-box"><h4>📊 Status Distribution</h4><canvas id="statusChart"></canvas></div></div>
      <div class="chart-container"><div class="chart-box"><h4>🏷️ Category Sales (Top 6)</h4><canvas id="categorySalesChart"></canvas></div><div class="chart-box"><h4>💳 Payment Method Distribution</h4><canvas id="paymentChart"></canvas></div></div>
      <div class="risk-legend"><span class="risk-badge-low">✅ Low Risk (0-30)</span><span class="risk-badge-med">⚠️ Medium Risk (31-60)</span><span class="risk-badge-high">🔴 High Risk (61-100)</span></div>
      <div style="margin-top:20px; background:#F8FAFE; border-radius:20px; padding:16px;"><strong>📌 Lead Auditor Summary:</strong> ${highRisk} high-risk events detected. Supplier TEX-41 flagged. Pending LC reviews: 24.</div></div>
    `;
    document.getElementById("dynamicContent").innerHTML = html;
    attachFilterEvents();
    setTimeout(() => {
      const monthly = { Jan:0, Feb:0, Mar:0, Apr:0 };
      const categoryMap = {};
      const paymentMap = {};
      filteredTransactions.forEach(t => { 
        const m = t.date.split('-')[1]; 
        if(m==='01') monthly.Jan+=t.amount; else if(m==='02') monthly.Feb+=t.amount; else if(m==='03') monthly.Mar+=t.amount; else if(m==='04') monthly.Apr+=t.amount;
        categoryMap[t.category] = (categoryMap[t.category] || 0) + t.amount;
        paymentMap[t.payment] = (paymentMap[t.payment] || 0) + 1;
      });
      const topCategories = Object.entries(categoryMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
      const ctxTrend = document.getElementById('trendChart')?.getContext('2d');
      const ctxStatus = document.getElementById('statusChart')?.getContext('2d');
      const ctxCategory = document.getElementById('categorySalesChart')?.getContext('2d');
      const ctxPayment = document.getElementById('paymentChart')?.getContext('2d');
      chartInstances.trend = new Chart(ctxTrend, { type: 'line', data: { labels: ['Jan','Feb','Mar','Apr'], datasets: [{ label: 'Sales (₹ Lakhs)', data: [monthly.Jan/1e5, monthly.Feb/1e5, monthly.Mar/1e5, monthly.Apr/1e5], borderColor: '#1e4a76', tension: 0.3, fill: true, backgroundColor: 'rgba(30,74,118,0.05)' }] } });
      const approved = filteredTransactions.filter(t=>t.status==="Approved").length;
      const flagged = filteredTransactions.filter(t=>t.status==="Flagged").length;
      const review = filteredTransactions.filter(t=>t.status==="Review").length;
      chartInstances.status = new Chart(ctxStatus, { type: 'doughnut', data: { labels: ['Approved','Flagged','Review'], datasets: [{ data: [approved,flagged,review], backgroundColor: ['#2b6e3c','#b91c1c','#a16207'] }] } });
      chartInstances.category = new Chart(ctxCategory, { type: 'bar', data: { labels: topCategories.map(c=>c[0]), datasets: [{ label: 'Sales (₹)', data: topCategories.map(c=>c[1]), backgroundColor: '#3b82f6' }] }, options: { responsive: true } });
      chartInstances.payment = new Chart(ctxPayment, { type: 'pie', data: { labels: Object.keys(paymentMap), datasets: [{ data: Object.values(paymentMap), backgroundColor: ['#1e4a76','#2c7a4b','#b45309','#a16207'] }] } });
    }, 50);
  }

  function renderTransactions() {
    let rows = '';
    filteredTransactions.forEach(t => {
      const riskLevel = getRiskLevel(t.riskScore);
      const riskClass = riskLevel === "High" ? 'risk-high' : (riskLevel === "Medium" ? 'risk-mid' : 'risk-low');
      const statusClass = t.status === 'Flagged' ? 'status-flagged' : (t.status === 'Review' ? 'status-review' : 'status-approved');
      rows += `<tr><td>${t.id}</td><td style="max-width:180px;">${t.product}</td><td>${t.category}</td><td>₹${t.amount.toLocaleString()}</td><td>${t.payment}</td><td>${t.date}</td><td>${t.time}</td><td><span class="${riskClass}">${t.riskScore} (${riskLevel})</span></td><td><span class="${statusClass}">${t.status}</span></td></tr>`;
    });
    const html = `<div class="section-title">📋 Trade Ledger · Transactions (${filteredTransactions.length} records)</div><div class="filter-bar"><div class="filters-group" id="categoryFilters"></div><div class="filters-group" id="paymentFilters"></div><div class="filters-group" id="durationFilters"></div><div class="refresh" id="refreshBtn">⟳ Refresh</div></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Product</th><th>Category</th><th>Amount</th><th>Payment</th><th>Date</th><th>Time</th><th>Risk Score</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    document.getElementById("dynamicContent").innerHTML = html;
    attachFilterEvents();
  }

  function renderRiskAnalysis() {
    const categories = [...new Set(allTransactions.map(t=>t.category))];
    let catRiskData = categories.map(cat => {
      const txns = filteredTransactions.filter(t=>t.category===cat);
      return { cat, low: txns.filter(t=>getRiskLevel(t.riskScore)==="Low").length, med: txns.filter(t=>getRiskLevel(t.riskScore)==="Medium").length, high: txns.filter(t=>getRiskLevel(t.riskScore)==="High").length, total: txns.length };
    }).filter(c=>c.total>0);
    const highRiskTotal = filteredTransactions.filter(t=>getRiskLevel(t.riskScore)==="High").length;
    const medRiskTotal = filteredTransactions.filter(t=>getRiskLevel(t.riskScore)==="Medium").length;
    const lowRiskTotal = filteredTransactions.filter(t=>getRiskLevel(t.riskScore)==="Low").length;
    const html = `
      <div><div class="section-title">⚠️ Risk Score Distribution & Logic</div>
      <div class="filter-bar"><div class="filters-group" id="categoryFilters"></div><div class="filters-group" id="paymentFilters"></div><div class="filters-group" id="durationFilters"></div><div class="refresh" id="refreshBtn">⟳ Refresh</div></div>
      <div class="risk-legend"><span class="risk-badge-low">Low Risk (0-30): ${lowRiskTotal}</span><span class="risk-badge-med">Medium Risk (31-60): ${medRiskTotal}</span><span class="risk-badge-high">High Risk (61-100): ${highRiskTotal}</span></div>
      <div class="chart-container"><div class="chart-box"><h4>📊 Risk Stacked Bar (by Category)</h4><canvas id="riskCategoryChart"></canvas></div><div class="chart-box"><h4>🥧 Overall Risk Distribution</h4><canvas id="riskPieChart"></canvas></div></div>
      <div class="chart-container"><div class="chart-box"><h4>📈 Risk Score Heat Index</h4><canvas id="riskHeatMap"></canvas></div><div class="chart-box"><h4>⚖️ Risk Logic Explanation</h4><div style="padding:20px; background:#f0f4f9; border-radius:20px;"><strong>Risk Score Algorithm:</strong><br/>• Amount > ₹18L → +32 points<br/>• Off-hour (22:00-06:00) → +22 points<br/>• Cash payment > ₹2.2L → +28 points<br/>• Supplier TEX-41 flagged → +18 points<br/>Final Score: 0-30 Low, 31-60 Medium, 61-100 High</div></div></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Category</th><th>Low Risk</th><th>Medium Risk</th><th>High Risk</th><th>Total</th></tr></thead><tbody>${catRiskData.map(c => `<tr><td>${c.cat}</td><td class="risk-low">${c.low}</td><td class="risk-mid">${c.med}</td><td class="risk-high">${c.high}</td><td>${c.total}</td></tr>`).join('')}</tbody></table></div></div>`;
    document.getElementById("dynamicContent").innerHTML = html;
    attachFilterEvents();
    setTimeout(() => {
      const ctxBar = document.getElementById('riskCategoryChart')?.getContext('2d');
      const ctxPie = document.getElementById('riskPieChart')?.getContext('2d');
      const ctxHeat = document.getElementById('riskHeatMap')?.getContext('2d');
      if (ctxBar) chartInstances.riskBar = new Chart(ctxBar, { type: 'bar', data: { labels: catRiskData.map(c=>c.cat), datasets: [{ label: 'High Risk', data: catRiskData.map(c=>c.high), backgroundColor: '#b91c1c' }, { label: 'Medium Risk', data: catRiskData.map(c=>c.med), backgroundColor: '#b45309' }, { label: 'Low Risk', data: catRiskData.map(c=>c.low), backgroundColor: '#2b6e3c' }] }, options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } } } });
      if (ctxPie) chartInstances.riskPie = new Chart(ctxPie, { type: 'pie', data: { labels: ['Low Risk','Medium Risk','High Risk'], datasets: [{ data: [lowRiskTotal, medRiskTotal, highRiskTotal], backgroundColor: ['#2b6e3c','#b45309','#b91c1c'] }] } });
      if (ctxHeat) chartInstances.riskHeat = new Chart(ctxHeat, { type: 'bar', data: { labels: catRiskData.map(c=>c.cat), datasets: [{ label: 'High Risk Count', data: catRiskData.map(c=>c.high), backgroundColor: '#ef4444' }, { label: 'Total Transactions', data: catRiskData.map(c=>c.total), backgroundColor: '#3b82f6', type: 'line' }] }, options: { responsive: true } });
    }, 50);
  }

  function renderAudits() {
    const findings = [
      { id: "AUD-001", title: "Multiple LC Drawings – Supplier TEX-41", details: "Three LC invoices within 48h totalling ₹97.35L. Identical BL references.", action: "Freeze supplier account. Implement duplicate detection." },
      { id: "AUD-002", title: "Off-Hours Export Transactions", details: "19 transactions 23:00-05:00 without customs validation. Exposure ₹18.2L.", action: "Enforce compliance override for post-hours entries." },
      { id: "AUD-003", title: "Bill of Lading Weight Mismatch", details: "Cotton bales show 14% weight variation vs manifest.", action: "Cross-verify weighbridge records." },
      { id: "AUD-004", title: "Forex & LC Gap", details: "Reconciliation gap ₹6,42,000 for 9 LCs.", action: "Automated daily forex reconciliation." }
    ];
    const auditsHtml = findings.map(a => `<div class="audit-card"><strong>${a.id} — ${a.title}</strong><p style="margin:8px 0;">${a.details}</p><div style="background:#EFF6FF; border-radius:14px; padding:10px;">→ Remediation: ${a.action}</div></div>`).join('');
    const html = `<div class="section-title">📑 Audit Findings — Akshya Impex (Q1 2026)</div><div class="filter-bar"><span class="filter-btn">Period: Jan-Mar 2026</span><span class="filter-btn">Lead Auditor: HARI PRASATH P</span></div>${auditsHtml}<hr><div>Audit coverage: 8 sourcing locations, 125 LC transactions, 44 import consignments.</div>`;
    document.getElementById("dynamicContent").innerHTML = html;
  }

  function attachFilterEvents() {
    const catContainer = document.getElementById("categoryFilters");
    if (catContainer) {
      const cats = ["All Categories", "Finished Fabric", "Raw Materials", "Yarn", "Garments", "Import Consignment", "Logistics", "Chemicals", "Dye", "cotton rolls", "Bconsignment", "house materials", "Product"];
      catContainer.innerHTML = cats.map(c => `<button class="category-filter ${activeCategory===c ? 'active' : ''}" data-cat="${c}">${c}</button>`).join('');
      document.querySelectorAll("[data-cat]").forEach(btn => btn.addEventListener("click", (e) => { activeCategory = e.target.getAttribute("data-cat"); applyFilters(); }));
    }
    const payContainer = document.getElementById("paymentFilters");
    if (payContainer) {
      const payments = ["All Payments", "Card", "UPI", "Cash", "NetBanking"];
      payContainer.innerHTML = payments.map(p => `<button class="payment-filter ${activePayment===p ? 'active' : ''}" data-pay="${p}">${p}</button>`).join('');
      document.querySelectorAll("[data-pay]").forEach(btn => btn.addEventListener("click", (e) => { activePayment = e.target.getAttribute("data-pay"); applyFilters(); }));
    }
    const durContainer = document.getElementById("durationFilters");
    if (durContainer) {
      const durations = ["Last 3 Months", "Last 9 Months", "Last 1 Year"];
      durContainer.innerHTML = durations.map(d => `<button class="duration-btn ${activeDuration===d ? 'active' : ''}" data-dur="${d}">${d}</button>`).join('');
      document.querySelectorAll("[data-dur]").forEach(btn => btn.addEventListener("click", (e) => { activeDuration = e.target.getAttribute("data-dur"); applyFilters(); }));
    }
    const refreshBtn = document.getElementById("refreshBtn");
    if (refreshBtn) refreshBtn.addEventListener("click", () => { activeCategory="All Categories"; activePayment="All Payments"; activeDuration="Last 3 Months"; applyFilters(); });
  }

  document.querySelectorAll(".menu-item").forEach(item => {
    item.addEventListener("click", () => {
      document.querySelectorAll(".menu-item").forEach(m => m.classList.remove("active"));
      item.classList.add("active");
      const page = item.getAttribute("data-page");
      if (page) { currentPage = page; applyFilters(); }
    });
  });
  applyFilters();
</script>
</body>
</html>
